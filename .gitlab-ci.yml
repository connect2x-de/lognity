workflow:
  auto_cancel:
    on_new_commit: interruptible
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - build
  - test
  - security
  - publish

variables:
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  BUILD_LINUX_IMAGE_NAME: registry.gitlab.com/connect2x/build-infrastructure/kmp-dockerfiles/kmp-dockerfiles-base:latest
  FF_USE_FASTZIP: "true"

.artifact-reports: &artifact-reports
  name: reports
  when: always
  paths: [ "**/build/reports" ]
  reports:
    junit: "**/build/test-results/**/TEST-*.xml"

.if-merge-request: &if-merge-request
  - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never

.if-main: &if-main
  - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never

.if-release: &if-release
  - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
  - if: $CI_PIPELINE_SOURCE == "schedule"
    when: never

build:
  stage: build
  timeout: 3h
  interruptible: true
  tags: [ "connect2x-mac" ]
  rules:
    - *if-merge-request
  script:
    - ./gradlew clean build

# Only required on macOS since it can build all targets
checkAbi:
  stage: test
  interruptible: true
  timeout: 1h
  needs: [ "build" ]
  tags: [ "connect2x-mac" ]
  artifacts: *artifact-reports
  rules:
    - *if-merge-request
  script:
    - ./gradlew :lognity-api:checkLegacyAbi :lognity-config:checkLegacyAbi

security:dependencies:
  stage: security
  interruptible: true
  timeout: 30m
  needs: [ ]
  tags: [ "connect2x-linux" ]
  image:
    name: "aquasec/trivy"
    entrypoint: [ "" ]
  variables:
    TRIVY_CACHE_DIR: ".trivycache/"
  cache:
    paths:
      - .trivycache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      allow_failure: true
    - if: '$CI_COMMIT_TAG =~ /^v\d+.\d+.\d+.*/'
      allow_failure: false
    - if: $CI_PIPELINE_SOURCE == "schedule"
      allow_failure: false
  artifacts:
    when: always
    reports:
      dependency_scanning: report.json
  script:
    - trivy repo ./ --exit-code 0 --ignorefile .trivyignore.yaml
    - trivy repo ./ --exit-code 0 --ignorefile .trivyignore.yaml --format template --template "@/contrib/gitlab.tpl" --output report.json
    - trivy repo ./ --exit-code 1 --ignorefile .trivyignore.yaml --severity CRITICAL

publish:release:
  stage: publish
  timeout: 3h
  tags: [ "connect2x-mac" ]
  rules:
    - *if-release
  script:
    - ./gradlew publishAllPublicationsToGitLabRepository publishAndReleaseToMavenCentral

publish:snapshot:
  stage: publish
  timeout: 3h
  tags: [ "connect2x-mac" ]
  rules:
    - *if-main
  script:
    - ./gradlew publishAllPublicationsToGitLabRepository